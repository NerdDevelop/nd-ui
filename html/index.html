<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>qb-ui DrawText</title>
    <!--
      Credits: nerd developer
      websiet: nertd-developer.com
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/ui.css" />
    <script src="js/ui.js" defer></script>
</head>
<body>
    <div id="drawtext-container" aria-live="polite" aria-atomic="true">
        <div id="card" class="badge" role="status" aria-live="polite" aria-atomic="true">
            <div class="icon-box" id="qb-icon" aria-hidden="true">
                <span id="qb-key">E</span>
            </div>
            <div class="text">
                <div class="name" id="qb-title"></div>
                <div class="sub" id="qb-subtitle"></div>
            </div>
        </div>
    </div>
</body>
</html>
